name: Test Comment Update Modes
description: Workflow to test the update-mode functionality
on:
  pull_request:
    types:
      - opened
      - synchronize
      - labeled

jobs:
  # Tests append mode adds new content instead of replacing prior comment text.
  test_update_mode_append:
    name: Test Update Mode Append
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    continue-on-error: true
    if: contains(github.event.pull_request.labels.*.name, 'test-update-mode')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: Comment On PR With Direct Comment
        uses: ./
        id: comment-direct
        with:
          comment-id: "test-append"
          comment-body: "test append - initial comment"
          conclusion: "success"
          update-mode: "append"

      - name: Update Comment With Append
        uses: ./
        id: comment-update-append
        with:
          comment-id: "test-append"
          comment-body: "test append - updated comment"
          conclusion: "success"
          update-mode: "append"

  # Tests create mode always posts a fresh comment on repeated runs.
  test_update_mode_create:
    name: Test Update Mode Create
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    continue-on-error: true
    if: contains(github.event.pull_request.labels.*.name, 'test-update-mode')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: Comment On PR With Direct Comment
        uses: ./
        id: comment-direct
        with:
          comment-id: "test-create"
          comment-body: "test create - initial comment"
          conclusion: "success"
          update-mode: "create"

      - name: Update Comment With Create
        uses: ./
        id: comment-update-create
        with:
          comment-id: "test-create"
          comment-body: "test create - updated comment"
          conclusion: "success"
          update-mode: "create"

  # Tests replace mode overwrites the existing comment content.
  test_update_mode_replace:
    name: Test Update Mode Replace
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    continue-on-error: true
    if: contains(github.event.pull_request.labels.*.name, 'test-update-mode')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: Comment On PR With Direct Comment
        uses: ./
        id: comment-direct
        with:
          comment-id: "test-replace"
          comment-body: "test replace - initial comment"
          conclusion: "success"
          update-mode: "replace"

      - name: Update Comment With Replace
        uses: ./
        id: comment-update-replace
        with:
          comment-id: "test-replace"
          comment-body: "test replace - updated comment"
          conclusion: "success"
          update-mode: "replace"

  # Tests none mode leaves the original comment unchanged on subsequent runs.
  test_update_mode_none_behavior:
    name: Test Update Mode None Behavior
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    continue-on-error: true
    if: contains(github.event.pull_request.labels.*.name, 'test-update-mode')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: Comment On PR With Direct Comment
        uses: ./
        id: comment-direct
        with:
          comment-id: "test-none-update"
          comment-body: "test update none - initial comment"
          conclusion: "success"
          update-mode: "none"

      - name: Comment Shouldn't Update With None Update Mode
        uses: ./
        id: comment-update-append
        with:
          comment-id: "test-none-update"
          comment-body: "test update none - updated comment"
          conclusion: "success"
          update-mode: "none"

  # Tests that hide-on-empty hides an existing comment if the comment-body is empty - update mode append.
  test_update_hide_on_empty_no_comment_body_append:
    name: Test Update Hide On Empty No Comment Body Append
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    continue-on-error: true
    if: contains(github.event.pull_request.labels.*.name, 'test-inputs')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: Make Initial Comment With Hide On Empty
        uses: ./
        id: comment-hide-on-empty-empty-comment-body-update-intial-append
        with:
          comment-id: "test-update-hide-on-empty-empty-comment-body"
          comment-body: "test hide on empty - initial comment"
          conclusion: "success"
          update-mode: "append"
          verbose-logging: true
          hide-on-empty: true

      - name: Update Comment With Hide On Empty
        uses: ./
        id: comment-hide-on-empty-empty-comment-body-update-append
        with:
          comment-id: "test-update-hide-on-empty-empty-comment-body"
          comment-body: ""
          conclusion: "success"
          update-mode: "append"
          verbose-logging: true
          hide-on-empty: true

  # Tests that hide-on-empty hides an existing comment if the comment-body is empty - update mode create.
  test_update_hide_on_empty_no_comment_body_create:
    name: Test Update Hide On Empty No Comment Body Create
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    continue-on-error: true
    if: contains(github.event.pull_request.labels.*.name, 'test-inputs')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: Make Initial Comment With Hide On Empty
        uses: ./
        id: comment-hide-on-empty-empty-comment-body-update-intial-create
        with:
          comment-id: "test-update-hide-on-empty-empty-comment-body"
          comment-body: "test hide on empty - initial comment"
          conclusion: "success"
          update-mode: "create"
          verbose-logging: true
          hide-on-empty: true

      - name: Update Comment With Hide On Empty
        uses: ./
        id: comment-hide-on-empty-empty-comment-body-update-create
        with:
          comment-id: "test-update-hide-on-empty-empty-comment-body"
          comment-body: ""
          conclusion: "success"
          update-mode: "create"
          verbose-logging: true
          hide-on-empty: true

  # Tests that hide-on-empty hides an existing comment if the file at comment-body-path is empty - update mode replace.
  test_update_hide_on_empty_no_comment_body_path:
    name: Test Update Hide On Empty With Empty Comment Body Path
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    continue-on-error: true
    if: contains(github.event.pull_request.labels.*.name, 'test-inputs')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: Load Environment Variables From .env File
        run: |
          grep '^COMMENT_BODY_PATH_2=' ci/vars/test.env >> $GITHUB_ENV
          grep '^COMMENT_BODY_PATH_3=' ci/vars/test.env >> $GITHUB_ENV

      - name: Make Initial Comment With Hide On Empty
        uses: ./
        id: comment-hide-on-empty-empty-comment-body-path-update-intial
        with:
          comment-id: "test-update-hide-on-empty-empty-comment-body-path"
          comment-body-path: ${{ env.COMMENT_BODY_PATH_2 }}
          conclusion: "success"
          update-mode: "create"
          verbose-logging: true
          hide-on-empty: true

      - name: Update Comment With Hide On Empty
        uses: ./
        id: comment-hide-on-empty-empty-comment-body-path-update-replace
        with:
          comment-id: "test-update-hide-on-empty-empty-comment-body-path"
          comment-body-path: ${{ env.COMMENT_BODY_PATH_3 }}
          conclusion: "success"
          update-mode: "replace"
          verbose-logging: true
          hide-on-empty: true

